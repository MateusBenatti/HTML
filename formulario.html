<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Formulario</title>
</head>
<body style="background-color: cadetblue;" text="black">
	<form>
		<p>
			<label for="nome">Nome:</label>
			<input type="text" name="nome" maxlength="10" placeholder="Digite o seu nome" required>
		</p>
		<p>
			<label for="senha">Senha:</label>
			<input type="password" name="senha" maxlength="6" placeholder="Digite a sua senha" required>
		</p>
		<p>
			<label for="upload">Selecione:</label>
			<input type="file" name="imagen">
		</p>
		<p>
			<label for="escolha">Meus hobbys:</label> <br>
			<input type="checkbox" name="estudar"> Estudar <br>
			<input type="checkbox" name="jogar"> Jogar <br>
			<input type="checkbox" name="dormir"> Dormir <br>
		</p>
		<p>
			<label for="opcao">Sexo:</label> <br>
			<input type="radio" name="sexo" value="m">Masculino <br>
			<input type="radio" name="sexo" value="f">Feminino <br>
			<input type="radio" name="sexo" value="o">Outros <br>
		</p>
		<p>
			<input type="submit" name="login" value="Login">
			<input type="reset" name="limpar" value="Limpar">
		</p>
			<!-- Tags:
				"input" - tag que inseri um elemento de entrada de dados;
				"label" - tag rótulo que especifica determinado conteúdo de um formulario;

				Atributos:

				"for"             - é uma indicação ao "name";
				"type"            - criamos uma caixa de texto;
				"name"            - cra uma variável que representa a caixa de texto;
				"maxlength"       - limita a quantidade máxima de caracteres;
				"placeholder"     - coloca uma dica, instrução ao usuário;
				"type='text'"     - usamos isso para na caixa de texo aparecer textos(palavras normais);
				"type='password'" - usamos isso para na caixa de texto a senha fique ocultada;
				"type='submit'"   - Serve para criar um botão de login;
				"value"           - Serve para deixar um valor pre-definido (Na caixa de texto já insere um valor, terá que apagar);
				"type='reset'"    - Serve para criar um botão para limpar o que estiver escrito no login;
				"type='file'"     - Serve para criar um botão para selecionar um arquivo;
				"type='checkbox'" - Serve para adicionar uma caixa de seleção mutipla(caixa de faxer xizinho);
				"type='radio'"    - Serve para adicionar uma bolinha de seleção unica(bolinha de assinalar, para ter apenas uma opção deve ter "name" igual em todos para que o HTML entenda que é um bloco só);
				"required"        - Serve para que seja necessario adição de informação em um campo(Caixa de texto)
			-->
			<legend>IFSP Catanduva</legend>
		<label for="opcao">Escolha um curso</label>
			<select name="cursos" size="3">
				<option value="redes">Redes</option>
				<option value="quimica">Quimica</option>
				<option value="mecatronica">Macatronica</option>
				<option value="ads">ADS</option>
				<option value="engenharia">Engenharia</option>
			</select>
		</fieldset>
	</form>

</body>
</html>
